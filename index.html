<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Sandbox - Test PlayerController</title>
    <link rel="icon" type="image/x-icon" href="./assets/horror-16.ico">
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #111111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Mirino centrale per il Raycasting */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.1s ease;
            z-index: 10;
        }
        #crosshair.active {
            background-color: #ff0000;
            width: 14px;
            height: 14px;
            box-shadow: 0 0 8px #ff0000;
        }
        /* HUD della Stamina */
        #stamina-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
            height: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            border-radius: 4px;
            z-index: 10;
            overflow: hidden;
        }
        #stamina-bar {
            width: 100%;
            height: 100%;
            background-color: #00ffaa;
            box-shadow: 0 0 10px #00ffaa;
            transition: width 0.05s linear;
        }
        /* Istruzioni iniziali / Schermata di sblocco mouse */
        #instructions {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            display: none; /* Inizialmente nascosto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
            cursor: pointer;
            user-select: none;
        }
        #instructions h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #instructions p {
            font-size: 1.2rem;
            color: #cccccc;
            margin: 5px 0;
        }
        .controls-list {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }
        .controls-list li {
            margin: 8px 0;
            color: #e0e0e0;
        }
        .kbd {
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #fff;
        }
        /* Interfaccia di Log dei messaggi di gioco (UI HUD) */
        #hud-messages {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff3333;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px #000000;
            pointer-events: none;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
        }

        /* Aggiunte Menu Iniziale e Loading */
        .overlay-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 30;
        }
        
        #fade-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .glitch-text {
            font-size: 4rem;
            color: #aa0000;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #330000;
            margin-bottom: 50px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .diff-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #555;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .diff-btn:hover {
            border-color: #aa0000;
            color: #aa0000;
            box-shadow: 0 0 15px rgba(170, 0, 0, 0.5);
            transform: scale(1.05);
        }

        .loading-bar-container {
            width: 300px;
            height: 20px;
            border: 2px solid #555;
            margin-top: 20px;
        }

        #loading-bar-fill {
            width: 0%;
            height: 100%;
            background: #aa0000;
            transition: width 0.1s linear;
        }

        #loading-text {
            margin-top: 15px;
            color: #aaa;
            font-style: italic;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .pulse-text {
            animation: pulse 1.5s infinite ease-in-out;
        }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/examples/jsm/controls/PointerLockControls.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/PointerLockControls.js",
          "three/examples/jsm/loaders/FBXLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/FBXLoader.js",
          "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
          "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.1/esm/browser.js",
          "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@21.0.0/dist/tween.esm.js"
        }
      }
    </script>
</head>
<body>
    <!-- Div per visualizzare eventuali errori a schermo -->
    <div id="error-log" style="position:absolute; top:10px; left:10px; color:red; z-index:9999; font-weight:bold; pointer-events:none; white-space:pre-wrap;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.getElementById('error-log').innerText += '\n' + msg + ' (' + lineNo + ':' + columnNo + ')';
            return false;
        };
    </script>
    <div id="fade-overlay"></div>

    <div id="main-menu" class="overlay-screen">
        <h1 class="glitch-text" data-text="TRIO MONNEZZA">TRIO MONNEZZA</h1>
      <p class="subtitle">Horror Sandbox</p>
      
      <div class="menu-buttons">
            <button class="diff-btn" data-diff="easy">Map Easy</button>
            <button class="diff-btn" data-diff="medium">Map Medium</button>
            <button class="diff-btn" data-diff="hard">Map Hard</button>
      </div>
    </div>

    <div id="loading-screen" class="overlay-screen" style="display: none;">
        <h2 class="pulse-text" style="color: #aa0000; font-size: 2.5rem;">Loading...</h2>
        <div class="loading-bar-container">
            <div id="loading-bar-fill"></div>
        </div>
        <p id="loading-text">Hiding keys...</p>
    </div>

    <div id="instructions">
        <h1>Horror Test Sandbox</h1>
        <p>Click anywhere to start playing</p>
        <ul class="controls-list">
            <li><span class="kbd">W</span> <span class="kbd">A</span> <span class="kbd">S</span> <span class="kbd">D</span> or <span class="kbd">Arrows</span> - Movement</li>
            <li><span class="kbd">Space</span> - Sprint (limited stamina)</li>
            <li><span class="kbd">Mouse</span> - Look around</li>
            <li><span class="kbd">E</span> - Interact (Collect keys / Open doors)</li>
            <li><span class="kbd">ESC</span> - Pause / Unlock cursor</li>
        </ul>
    </div>

    <div id="crosshair"></div>

    <div id="stamina-container">
        <div id="stamina-bar"></div>
    </div>

    <div id="hud-messages"></div>

    <script type="module" src="main.js"></script>

    <script>
        const instructions    = document.getElementById('instructions');
        const crosshair       = document.getElementById('crosshair');
        const hudMessages     = document.getElementById('hud-messages');
        const staminaBar      = document.getElementById('stamina-bar');
        const mainMenu        = document.getElementById('main-menu');
        const loadingScreen   = document.getElementById('loading-screen');
        const loadingBarFill  = document.getElementById('loading-bar-fill');
        const loadingText     = document.getElementById('loading-text');
        const fadeOverlay     = document.getElementById('fade-overlay');

        let msgTimeout;
        let phraseInterval;

        const loadingPhrases = [
            "Hiding keys...",
            "Awakening the horror...",
            "Turn off the lights...",
            "Generating corridors...",
            "Don't look behind you...",
            "Preparing jumpscares..."
        ];

        // ── Bottoni del menu ────────────────────────────────────────
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const diff = e.currentTarget.getAttribute('data-diff');

                // Mostra loading, nascondi menu
                mainMenu.style.display = 'none';
                loadingScreen.style.display = 'flex';
                loadingBarFill.style.width = '0%';

                // Cicla frasi di caricamento
                let phraseIndex = 0;
                loadingText.innerText = loadingPhrases[0];
                clearInterval(phraseInterval);
                phraseInterval = setInterval(() => {
                    phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
                    loadingText.innerText = loadingPhrases[phraseIndex];
                }, 1800);

                // Avvia il gioco
                try {
                    document.dispatchEvent(new CustomEvent('startGameEvent', { detail: { difficulty: diff } }));
                } catch (err) {
                    document.getElementById('error-log').innerText += '\nError: ' + err.message;
                    console.error(err);
                }
            });
        });

        // ── Aggiorna barra di caricamento ───────────────────────────
        document.addEventListener('assetProgressEvent', (e) => {
            loadingBarFill.style.width = e.detail.progress + '%';
        });

        // ── Tutto caricato → mostra istruzioni ──────────────────────
        let gameStarted = false;
        document.addEventListener('assetsLoadedEvent', () => {
            clearInterval(phraseInterval);
            loadingScreen.style.display = 'none';
            instructions.style.display  = 'flex';
            gameStarted = true;
        });

        // ── PointerLock: nascondi/mostra istruzioni ─────────────────
        document.addEventListener('pointerlockchange', () => {
            if (!gameStarted) return;
            const locked = document.pointerLockElement === document.body
                        || document.pointerLockElement?.tagName === 'CANVAS';
            instructions.style.display = locked ? 'none' : 'flex';
        });

        // ── HUD Stamina ─────────────────────────────────────────────
        document.addEventListener('staminaChanged', (e) => {
            const pct = e.detail.percentuale;
            staminaBar.style.width           = pct + '%';
            staminaBar.style.backgroundColor = pct <= 0 ? '#ff3333' : '#00ffaa';
        });

        // ── Mirino ──────────────────────────────────────────────────
        document.addEventListener('uiTargetChanged', (e) => {
            crosshair.classList.toggle('active', !!e.detail.name);
        });

        // ── Messaggi HUD ────────────────────────────────────────────
        document.addEventListener('logMessaggioUI', (e) => {
            hudMessages.innerText      = e.detail.testo;
            hudMessages.style.display  = 'block';
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => { hudMessages.style.display = 'none'; }, 3000);
        });
    </script>
</body>
</html>
