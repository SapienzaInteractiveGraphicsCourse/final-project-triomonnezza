<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Sandbox - Test PlayerController</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #111111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Mirino centrale per il Raycasting */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.1s ease;
            z-index: 10;
        }
        #crosshair.active {
            background-color: #ff0000;
            width: 14px;
            height: 14px;
            box-shadow: 0 0 8px #ff0000;
        }
        /* HUD della Stamina */
        #stamina-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
            height: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #333;
            border-radius: 4px;
            z-index: 10;
            overflow: hidden;
        }
        #stamina-bar {
            width: 100%;
            height: 100%;
            background-color: #00ffaa;
            box-shadow: 0 0 10px #00ffaa;
            transition: width 0.05s linear;
        }
        /* Istruzioni iniziali / Schermata di sblocco mouse */
        #instructions {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
            cursor: pointer;
            user-select: none;
        }
        #instructions h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff3333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #instructions p {
            font-size: 1.2rem;
            color: #cccccc;
            margin: 5px 0;
        }
        .controls-list {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }
        .controls-list li {
            margin: 8px 0;
            color: #e0e0e0;
        }
        .kbd {
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #fff;
        }
        /* Interfaccia di Log dei messaggi di gioco (UI HUD) */
        #hud-messages {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff3333;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px #000000;
            pointer-events: none;
            z-index: 5;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
        }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/examples/jsm/controls/PointerLockControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js"
        }
      }
    </script>
</head>
<body>

    <div id="instructions">
        <h1>Horror Test Sandbox</h1>
        <p>Clicca in qualunque punto per iniziare a giocare</p>
        <ul class="controls-list">
            <li><span class="kbd">W</span> <span class="kbd">A</span> <span class="kbd">S</span> <span class="kbd">D</span> o <span class="kbd">Frecce</span> - Movimento</li>
            <li><span class="kbd">Space</span> - Scatto con stamina limitata</li>
            <li><span class="kbd">Mouse</span> - Guarda in giro</li>
            <li><span class="kbd">E</span> - Interagisci (Raccogli chiavi / Apri porte)</li>
            <li><span class="kbd">ESC</span> - Pausa / Sblocca cursore</li>
        </ul>
    </div>

    <div id="crosshair"></div>

    <div id="stamina-container">
        <div id="stamina-bar"></div>
    </div>

    <div id="hud-messages"></div>

    <script type="module" src="main.js"></script>

    <script>
        const instructions = document.getElementById('instructions');
        const crosshair = document.getElementById('crosshair');
        const hudMessages = document.getElementById('hud-messages');
        const staminaBar = document.getElementById('stamina-bar');
        let msgTimeout;

        // Nascondi/Mostra la schermata iniziale in base al PointerLock
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body || document.pointerLockElement?.tagName === 'CANVAS') {
                instructions.style.display = 'none';
            } else {
                instructions.style.display = 'flex';
            }
        });

        // Ascolta l'evento di cambio stamina inviato dal PlayerController
        document.addEventListener('staminaChanged', (e) => {
            const percentuale = e.detail.percentuale;
            staminaBar.style.width = percentuale + '%';
            
            // Feedback visivo se la stamina è esaurita
            if (percentuale <= 0) {
                staminaBar.style.backgroundColor = '#ff3333';
            } else {
                staminaBar.style.backgroundColor = '#00ffaa';
            }
        });

        // 1. Cambia lo stato del mirino se stai guardando un oggetto interattivo
        document.addEventListener('uiTargetChanged', (e) => {
            if (e.detail.name) {
                crosshair.classList.add('active');
            } else {
                crosshair.classList.remove('active');
            }
        });

        // 2. Mostra un feedback testuale a schermo quando la porta è bloccata
        document.addEventListener('logMessaggioUI', (e) => {
            hudMessages.innerText = e.detail.testo;
            hudMessages.style.display = 'block';
            
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => {
                hudMessages.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
