<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Sandbox - Test PlayerController</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #030303;
            --void-glass: rgba(0, 0, 0, 0.9);
            --crimson: #990000;
            --crimson-glow: rgba(153, 0, 0, 0.6);
            --bone: #d9d9d9;
            --bone-dim: #777777;
            --gold: #ccaa00;
            --gold-glow: rgba(204, 170, 0, 0.5);
            --stamina-full: rgba(150, 150, 150, 1);
            --stamina-empty: rgba(153, 0, 0, 1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: var(--void);
            font-family: 'VT323', monospace;
            color: var(--bone);
            text-shadow: 1px 1px 0 #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* PSX look for any scaled textures */
        }

        /* ── CRT / PSX Scanlines & Noise ── */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            mix-blend-mode: overlay;
        }

        /* ── Crosshair ── */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.8);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 1px 1px 0 #000;
        }
        #crosshair.active {
            background-color: var(--crimson);
            width: 12px;
            height: 12px;
            border: 2px solid var(--void);
        }

        /* ── HUD Stamina (Blocky PSX style) ── */
        #stamina-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 250px;
            height: 16px;
            background: #111;
            border: 2px solid #333;
            z-index: 10;
            overflow: hidden;
            box-shadow: 2px 2px 0 #000;
        }
        #stamina-bar {
            width: 100%;
            height: 100%;
            background: var(--stamina-full);
            transition: width 0.1s steps(10), background-color 0.1s steps(2);
        }

        /* ── HUD Inventory (Key) ── */
        #key-hud {
            display: none; /* Iniziamente nascosto */
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 64px;
            height: 64px;
            background: #111;
            border: 2px solid var(--gold);
            z-index: 15;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0 #000;
            animation: slideInUp 0.1s steps(5) forwards;
        }
        #key-hud img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
        }

        /* ── HUD Messages (Blocky) ── */
        #hud-messages {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--bone);
            font-size: 1.8rem;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(0,0,0,0.8);
            border: 2px solid #333;
            padding: 8px 16px;
            box-shadow: 4px 4px 0 #000;
            opacity: 0;
        }
        #hud-messages.show {
            opacity: 1;
        }

        /* ── Overlays (Menu, Loading, Instructions) ── */
        .overlay-screen {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 30;
        }

        #fade-overlay {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s steps(10);
        }

        /* ── Main Menu Title ── */
        .title-container {
            margin-bottom: 40px;
        }
        .glitch-text {
            font-size: 6rem;
            color: var(--bone);
            margin: 0;
            text-shadow: 4px 4px 0 var(--crimson);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .subtitle {
            font-size: 2rem;
            letter-spacing: 8px;
            color: var(--bone-dim);
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* ── Menu Buttons (PSX Style) ── */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 320px;
        }
        .diff-btn {
            background: #111;
            color: var(--bone);
            border: 2px solid #444;
            padding: 12px 0;
            font-size: 2rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 #000;
        }
        .diff-btn:hover {
            color: #fff;
            border-color: var(--crimson);
            background: #200000;
            box-shadow: 4px 4px 0 var(--crimson);
            transform: translate(-2px, -2px);
        }
        .diff-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 #000;
        }

        /* ── Loading Screen ── */
        .pulse-text {
            color: var(--crimson);
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .loading-bar-container {
            width: 300px;
            height: 16px;
            background: #111;
            border: 2px solid #444;
            position: relative;
        }
        #loading-bar-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            width: 0%;
            background: var(--crimson);
            transition: width 0.1s steps(10);
        }
        #loading-text {
            margin-top: 20px;
            color: var(--bone-dim);
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        /* ── Instructions Screen ── */
        #instructions {
            display: none;
            z-index: 20;
            background: rgba(0,0,0,0.95);
        }
        #instructions h1 {
            font-size: 5rem;
            color: var(--crimson);
            margin-bottom: 10px;
            text-shadow: 4px 4px 0 #000;
        }
        .click-prompt {
            font-size: 2rem;
            color: var(--bone-dim);
            margin-bottom: 40px;
        }
        .controls-list {
            background: #111;
            padding: 20px 40px;
            border: 2px solid #333;
            text-align: left;
            list-style: none;
            box-shadow: 4px 4px 0 #000;
        }
        .controls-list li {
            margin: 15px 0;
            color: var(--bone);
            font-size: 1.5rem;
        }
        .kbd {
            background: #222;
            border: 2px solid #555;
            padding: 2px 8px;
            color: #fff;
            margin-right: 15px;
            box-shadow: 2px 2px 0 #000;
            text-transform: uppercase;
        }

        /* ── Keyframes ── */
        @keyframes slideInUp {
            from { transform: translateY(20px); }
            to { transform: translateY(0); }
        }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/examples/jsm/controls/PointerLockControls.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/PointerLockControls.js",
          "three/examples/jsm/loaders/FBXLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/FBXLoader.js",
          "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
          "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.1/esm/browser.js",
          "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@21.0.0/dist/tween.esm.js"
        }
      }
    </script>
</head>
<body>
    <!-- Div per visualizzare eventuali errori a schermo -->
    <div id="error-log" style="position:absolute; top:10px; left:10px; color:red; z-index:9999; font-weight:bold; pointer-events:none; white-space:pre-wrap;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.getElementById('error-log').innerText += '\n' + msg + ' (' + lineNo + ':' + columnNo + ')';
            return false;
        };
    </script>
    <div class="noise-overlay"></div>
    <div id="fade-overlay"></div>

    <div id="main-menu" class="overlay-screen">
        <div class="title-container">
            <h1 class="glitch-text" data-text="TRIO MONNEZZA">TRIO MONNEZZA</h1>
            <p class="subtitle">Descent into Madness</p>
        </div>
        <div class="menu-buttons">
            <button class="diff-btn" data-diff="easy">Map Easy</button>
            <button class="diff-btn" data-diff="medium">Map Medium</button>
            <button class="diff-btn" data-diff="hard">Map Hard</button>
        </div>
    </div>

    <div id="loading-screen" class="overlay-screen" style="display: none;">
        <h2 class="pulse-text">DESCENDING...</h2>
        <div class="loading-bar-container">
            <div id="loading-bar-fill"></div>
        </div>
        <p id="loading-text">Manifesting horrors...</p>
    </div>

    <div id="instructions" class="overlay-screen">
        <h1>SURVIVE</h1>
        <p class="click-prompt">Click to enter the nightmare</p>
        <ul class="controls-list">
            <li><span class="kbd">W A S D</span> Movement</li>
            <li><span class="kbd">Space</span> Sprint</li>
            <li><span class="kbd">Mouse</span> Look around</li>
            <li><span class="kbd">E</span> Interact</li>
            <li><span class="kbd">ESC</span> Pause</li>
        </ul>
    </div>

    <div id="crosshair"></div>

    <div id="stamina-container">
        <div id="stamina-bar"></div>
    </div>

    <div id="hud-messages"></div>
    
    <div id="key-hud">
        <img src="assets/ui/key.png" alt="Key" />
    </div>

    <script type="module" src="main.js"></script>

    <script>
        const instructions    = document.getElementById('instructions');
        const crosshair       = document.getElementById('crosshair');
        const hudMessages     = document.getElementById('hud-messages');
        const staminaBar      = document.getElementById('stamina-bar');
        const mainMenu        = document.getElementById('main-menu');
        const loadingScreen   = document.getElementById('loading-screen');
        const loadingBarFill  = document.getElementById('loading-bar-fill');
        const loadingText     = document.getElementById('loading-text');
        const fadeOverlay     = document.getElementById('fade-overlay');

        let msgTimeout;
        let phraseInterval;

        const loadingPhrases = [
            "Hiding keys...",
            "Awakening the horror...",
            "Turn off the lights...",
            "Generating corridors...",
            "Don't look behind you...",
            "Preparing jumpscares..."
        ];

        // ── Bottoni del menu ────────────────────────────────────────
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const diff = e.currentTarget.getAttribute('data-diff');

                // Mostra loading, nascondi menu
                mainMenu.style.display = 'none';
                loadingScreen.style.display = 'flex';
                loadingBarFill.style.width = '0%';

                // Cicla frasi di caricamento
                let phraseIndex = 0;
                loadingText.innerText = loadingPhrases[0];
                clearInterval(phraseInterval);
                phraseInterval = setInterval(() => {
                    phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
                    loadingText.innerText = loadingPhrases[phraseIndex];
                }, 1800);

                // Avvia il gioco
                try {
                    document.dispatchEvent(new CustomEvent('startGameEvent', { detail: { difficulty: diff } }));
                } catch (err) {
                    document.getElementById('error-log').innerText += '\nError: ' + err.message;
                    console.error(err);
                }
            });
        });

        // ── Aggiorna barra di caricamento ───────────────────────────
        document.addEventListener('assetProgressEvent', (e) => {
            loadingBarFill.style.width = e.detail.progress + '%';
        });

        // ── Tutto caricato → mostra istruzioni ──────────────────────
        let gameStarted = false;
        document.addEventListener('assetsLoadedEvent', () => {
            clearInterval(phraseInterval);
            loadingScreen.style.display = 'none';
            instructions.style.display  = 'flex';
            gameStarted = true;
        });

        // ── PointerLock: nascondi/mostra istruzioni ─────────────────
        document.addEventListener('pointerlockchange', () => {
            if (!gameStarted) return;
            const locked = document.pointerLockElement === document.body
                        || document.pointerLockElement?.tagName === 'CANVAS';
            instructions.style.display = locked ? 'none' : 'flex';
        });

        // ── HUD Stamina ─────────────────────────────────────────────
        document.addEventListener('staminaChanged', (e) => {
            const pct = e.detail.percentuale;
            staminaBar.style.width = pct + '%';
            if (pct <= 20) {
                staminaBar.style.backgroundColor = 'var(--stamina-empty)';
            } else {
                staminaBar.style.backgroundColor = 'var(--stamina-full)';
            }
        });

        // ── Mirino ──────────────────────────────────────────────────
        document.addEventListener('uiTargetChanged', (e) => {
            crosshair.classList.toggle('active', !!e.detail.name);
        });

        // ── Messaggi HUD ────────────────────────────────────────────
        document.addEventListener('logMessaggioUI', (e) => {
            hudMessages.innerText = e.detail.testo;
            hudMessages.classList.add('show');
            clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => { hudMessages.classList.remove('show'); }, 3000);
        });

        // ── Auto-start (per Retry) ──────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const autoDiff = urlParams.get('diff');
        if (autoDiff) {
            const btn = document.querySelector(`.diff-btn[data-diff="${autoDiff}"]`);
            if (btn) btn.click();
        }
    </script>
</body>
</html>
